# Nginx site config for Hitech BIMS.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/hitech_bims
#   sudo ln -s /etc/nginx/sites-available/hitech_bims /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace %DOMAIN% and %PROJECT_PATH% with real values (see DEPLOYMENT.md).
# TLS is intentionally left to `certbot --nginx`, which rewrites the server
# blocks below to add the certificate/443 redirect - run it after this file
# is enabled and DNS is pointed at the droplet.

upstream hitech_bims_app {
    server unix:/run/gunicorn/hitech_bims.sock fail_timeout=0;
}

# Only set "Connection: upgrade" on actual websocket upgrade requests, so
# ordinary HTTP requests keep normal keep-alive proxying behaviour. Kept for
# forward compatibility even though the app does not currently use websockets.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name %DOMAIN%;

    client_max_body_size 25M;

    access_log /var/log/nginx/hitech_bims.access.log;
    error_log  /var/log/nginx/hitech_bims.error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/xml image/svg+xml;

    # Security headers (defense in depth on top of Django's SecurityMiddleware).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    location /static/ {
        alias %PROJECT_PATH%/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias %PROJECT_PATH%/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass http://hitech_bims_app;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
