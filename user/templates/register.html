<!-- user/templates/user/register.html -->
<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BIMS</title>
    <link href="{% static 'css/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/auth.css' %}" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">

        <!-- Brand -->
        <div class="auth-brand">
            <img src="{% static 'images/logo.png' %}" alt="BIMS Logo"
                 onerror="this.style.display='none'">
            <div class="brand-name">Hi Tech Farms</div>
            <div class="brand-sub">Business Information Management System</div>
        </div>

        <!-- Register Card -->
        <div class="auth-card">
            <div class="card-title">Create Account</div>
            <div class="card-subtitle">Join BIMS to manage your poultry farm efficiently</div>

            <form method="POST">
                {% csrf_token %}
                <div>
                    <label class="auth-form-label" for="username">Username</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="username" id="username" class="form-control" required
                               placeholder="Choose a username">
                    </div>
                </div>
                <div>
                    <label class="auth-form-label" for="password">Password</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" id="password" class="form-control" required
                               placeholder="Create a password">
                    </div>
                </div>
                <div>
                    <label class="auth-form-label" for="department">Department</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-building input-icon"></i>
                        <input type="text" name="department" id="department" class="form-control"
                               placeholder="Enter your department">
                    </div>
                </div>
                <div>
                    <label class="auth-form-label" for="role">Role</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-user-tag input-icon"></i>
                        <select name="role" id="role" class="form-select">
                            <option value="" disabled selected>Select your role</option>
                            <option value="admin">Admin</option>
                            <option value="manager">Manager</option>
                            <option value="supervisor">Supervisor</option>
                            <option value="staff">Staff</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p class="mb-0">
                    Already have an account?
                    <a href="{% url 'login' %}">
                        <i class="fas fa-sign-in-alt me-1"></i>Login here
                    </a>
                </p>
            </div>
        </div>

    </div>
</body>
</html>
