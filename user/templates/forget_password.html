<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BIMS</title>
    <link href="{% static 'css/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/auth.css' %}" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">

        <!-- Brand -->
        <div class="auth-brand">
            <img src="{% static 'images/logo.png' %}" alt="BIMS Logo"
                 onerror="this.style.display='none'">
            <div class="brand-name">Hi Tech Farms</div>
            <div class="brand-sub">Business Information Management System</div>
        </div>

        <!-- Forgot Password Card -->
        <div class="auth-card">
            <div class="card-title">Reset Password</div>
            <p class="auth-help-text">Enter your email address and we'll send you a link to reset your password</p>

            <form method="POST">
                {% csrf_token %}
                <div>
                    <label class="auth-form-label" for="email">Email</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" name="email" id="email" class="form-control" required
                               placeholder="Enter your email address">
                    </div>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-paper-plane"></i>
                    Send Reset Link
                </button>
            </form>

            <div class="auth-footer">
                <p class="mb-0">
                    Remember your password?
                    <a href="{% url 'login' %}">
                        <i class="fas fa-sign-in-alt me-1"></i>Back to Login
                    </a>
                </p>
            </div>
        </div>

    </div>
</body>
</html>
