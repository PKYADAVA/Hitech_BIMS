{% extends 'base.html' %}
{% block title %}User Profile{% endblock %}
{% block nav %}
{% include 'main_top_navbar.html' with active_tab='home' %}
{% endblock nav %}
{% block content %}

<div class="page-header">
    <div class="page-header-main">
      <div class="page-header-title">User Profile</div>
      <div class="page-header-subtitle">View and update your profile information</div>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-user me-2"></i>Profile Details</h5>
            </div>
            <div class="card-body">
                <form id="user-profile-form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="first_name" class="form-label">First Name</label>
                        <input
                            type="text"
                            id="first_name"
                            class="form-control"
                            placeholder="Enter first name"
                            value="{{ user.first_name }}"
                            required
                        />
                    </div>
                    <div class="mb-3">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input
                            type="text"
                            id="last_name"
                            class="form-control"
                            placeholder="Enter last name"
                            value="{{ user.last_name }}"
                            required
                        />
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            placeholder="Enter email"
                            value="{{ user.email }}"
                            required
                        />
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function () {
        $("#user-profile-form").on("submit", function (e) {
            e.preventDefault();

            $.ajax({
                url: "{% url 'user_profile' %}",
                type: "POST",
                data: {
                    first_name: $("#first_name").val(),
                    last_name: $("#last_name").val(),
                    email: $("#email").val(),
                    csrfmiddlewaretoken: $("input[name=csrfmiddlewaretoken]").val(),
                },
                success: function (response) {
                    window.showToast('success', response.message || "Profile updated successfully!");
                },
                error: function (xhr) {
                    const message = xhr.responseJSON && xhr.responseJSON.error
                        ? xhr.responseJSON.error
                        : "Error updating profile. Please try again.";
                    window.showToast('danger', message);
                },
            });
        });
    });
</script>
{% endblock content %}
