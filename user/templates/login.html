<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Hi Tech Farms BIMS</title>
  <link href="{% static 'css/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/auth.css' %}" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="auth-brand">
      <img src="{% static 'images/logo.png' %}" alt="BIMS Logo"
           onerror="this.style.display='none'">
      <div class="brand-name">Hi Tech Farms</div>
      <div class="brand-sub">Business Information Management System</div>
    </div>

    <!-- Login Card -->
    <div class="auth-card">
      <div class="card-title">Welcome back!</div>
      <div class="card-subtitle">Sign in to your BIMS account to continue</div>

      {% if messages %}
        {% for message in messages %}
          <div class="auth-error">
            <i class="fas fa-exclamation-circle"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" autocomplete="off">
        {% csrf_token %}

        <div>
          <label class="auth-form-label" for="username">Username</label>
          <div class="auth-input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="Enter your username" required autofocus>
          </div>
        </div>

        <div>
          <label class="auth-form-label" for="password">Password</label>
          <div class="auth-input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="btn-auth">
          <i class="fas fa-sign-in-alt"></i>
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        <a href="{% url 'forgot_password' %}">
          <i class="fas fa-key me-1"></i>Forgot Password?
        </a>
        <span class="divider-dot">·</span>
        <a href="{% url 'register' %}">
          <i class="fas fa-user-plus me-1"></i>Register
        </a>
      </div>
    </div>

  </div>
</body>
</html>
